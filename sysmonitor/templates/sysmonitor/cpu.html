{% load static %}

<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{% static 'sysmonitor/styles/cpu.css' %}">
    </head>
    <body>
        <header>
            <h1>CPU</h1>
        </header>
        <nav class="flex-nav">
            <a href="{% url 'index' %}">Home</a>
            <a href="{% url 'cpu_view' %}" class="active">CPU</a>
            <a href="{% url 'ram_view' %}">RAM</a>
            <a href="{% url 'drives_view' %}">Drives</a>
            <a href="{% url 'sys_view' %}">System Info</a>
        </nav>

        <main>
            <div class="container">
                <div class="icon">
                    <img src="{{ img_url }}" alt="CPU Brand" width="250vw" height="250vw">
                </div>
                <div class="info" id="info">
                    <p>CPU: {{ cpu_name }}</p>
                    <p>Vendor: {{ cpu_vendor }}</p>
                    <p>Physical Cores: {{ phys_cores }}</p>
                    <p>Logical Cores: {{ logical_cores}}</p>
                    <p>Frequency: {{ frequency }}GHz</p>
                    <p id="currentUsage">Usage: {{ current_usage }}%</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Alex Eduardo Molina Garcia - 202410130195</p>
        </footer>

        <script src="{% static 'sysmonitor/scripts/cpu.js' %}" async defer></script>
    </body>
</html>
